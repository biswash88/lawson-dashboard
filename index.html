<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>荒利益高計算機</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="calculator-icon-192.png">
    <meta name="theme-color" content="#111111">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #e7f0fb;
        --panel: #ffffff;
        --text: #111827;
        --muted: #475569;
        --line: #c6d1df;
        --primary: #2176ff;
        --primary-dark: #1558c8;
        --danger: #d92d20;
        --purple: #7d4cc2;
        --success: #12805c;
        --warning: #b35a00;
        --shadow: 0 18px 50px rgba(24, 38, 62, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(135deg, rgba(33, 118, 255, 0.16), transparent 34%),
          var(--bg);
        color: var(--text);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .app {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      main {
        width: min(1520px, calc(100% - 36px));
        margin: 0 auto;
        padding: 22px 0 10px;
        flex: 1;
      }

      .header {
        position: relative;
        margin-bottom: 18px;
        padding: 0;
        text-align: center;
      }

      .plan-badge {
        display: none;
      }

      .eyebrow {
        display: none;
      }

      h1 {
        max-width: 100%;
        margin: 0 auto;
        font-size: clamp(2.4rem, 4.8vw, 4.8rem);
        font-weight: 950;
        line-height: 0.94;
        white-space: nowrap;
        letter-spacing: 0;
      }

      .subtitle {
        max-width: 760px;
        margin: 8px auto 0;
        color: var(--muted);
        font-size: 0.96rem;
        line-height: 1.45;
      }

      .layout {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 14px;
        align-items: start;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .inputs {
        padding: 16px;
      }

      .mode-toggle {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 12px;
      }

      .solve-toggle {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        margin-bottom: 12px;
      }

      .toggle-caption {
        margin: 0 0 6px;
        color: var(--muted);
        font-size: 0.76rem;
        font-weight: 900;
      }

      .support-toggle {
        display: none;
        grid-template-columns: 78px repeat(3, 1fr);
        gap: 8px;
        align-items: center;
        margin-bottom: 12px;
        padding: 8px;
        border: 1px solid rgba(18, 128, 92, 0.36);
        border-radius: 8px;
        background: rgba(18, 128, 92, 0.12);
      }

      .support-toggle.is-visible {
        display: grid;
      }

      .support-label {
        color: var(--muted);
        font-size: 0.76rem;
        font-weight: 900;
      }

      .mode-button,
      .solve-button,
      .support-button {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f7faff;
        color: var(--text);
        font: inherit;
        font-size: 0.78rem;
        font-weight: 900;
        cursor: pointer;
        transition:
          background 160ms ease,
          border-color 160ms ease,
          box-shadow 160ms ease,
          transform 160ms ease;
      }

      .mode-button:hover,
      .mode-button:focus-visible,
      .solve-button:hover,
      .solve-button:focus-visible,
      .support-button:hover,
      .support-button:focus-visible {
        border-color: var(--primary);
        box-shadow: 0 10px 24px rgba(33, 118, 255, 0.14);
        outline: none;
        transform: translateY(-1px);
      }

      .mode-button.is-active,
      .solve-button.is-active,
      .support-button.is-active {
        border-color: #111827;
        background: #111827;
        color: #ffffff;
        box-shadow: 0 10px 24px rgba(17, 24, 39, 0.18);
      }

      .reset-button {
        width: 100%;
        min-height: 36px;
        margin: 0 0 12px;
        border: 1px solid #b8c3d2;
        border-radius: 8px;
        background: #ffffff;
        color: #111827;
        font: inherit;
        font-size: 0.82rem;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(24, 38, 62, 0.08);
      }

      .reset-button:hover,
      .reset-button:focus-visible {
        border-color: #111827;
        background: #111827;
        color: #ffffff;
        outline: none;
      }

      .field {
        margin-bottom: 10px;
      }

      .field:last-child {
        margin-bottom: 0;
      }

      .field-profit-target {
        position: relative;
        margin-bottom: 12px;
        padding: 12px;
        overflow: hidden;
        border: 1px solid rgba(18, 128, 92, 0.46);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(18, 128, 92, 0.22), rgba(33, 118, 255, 0.14)),
          #ffffff;
      }

      .field-profit-target::before {
        content: "";
        position: absolute;
        inset: 0 0 auto;
        height: 5px;
        background: linear-gradient(90deg, var(--success), var(--primary));
      }

      .goal-kicker {
        margin: 0 0 8px;
        color: var(--success);
        font-size: 0.78rem;
        font-weight: 900;
      }

      .field-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 5px;
      }

      label {
        display: block;
        font-weight: 800;
      }

      .live-value {
        max-width: 52%;
        padding: 4px 8px;
        border-radius: 8px;
        background: rgba(33, 118, 255, 0.18);
        color: var(--primary-dark);
        font-size: 0.78rem;
        font-weight: 900;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .field-profit-target label,
      .field-profit-target .unit,
      .field-profit-target .live-value {
        color: var(--success);
      }

      .field-profit-target .live-value {
        background: #ffffff;
        box-shadow: 0 8px 20px rgba(18, 128, 92, 0.2);
      }

      .field-waste label,
      .field-waste .unit,
      .field-waste .live-value {
        color: var(--danger);
      }

      .field-waste .live-value {
        background: rgba(217, 45, 32, 0.18);
      }

      .field-discount label,
      .field-discount .unit,
      .field-discount .live-value {
        color: var(--purple);
      }

      .field-discount .live-value {
        background: rgba(125, 76, 194, 0.2);
      }

      .field-days label,
      .field-days .unit,
      .field-days .live-value {
        color: var(--primary-dark);
      }

      .input-wrap {
        position: relative;
      }

      input {
        width: 100%;
        height: 40px;
        padding: 0 48px 0 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        background: #f8fbff;
        font-size: 1rem;
        font-weight: 700;
        outline: none;
        transition:
          border-color 160ms ease,
          box-shadow 160ms ease,
          background 160ms ease;
      }

      input:focus {
        border-color: var(--primary);
        background: #ffffff;
        box-shadow: 0 0 0 4px rgba(33, 118, 255, 0.14);
      }

      input:disabled {
        opacity: 0.86;
        cursor: not-allowed;
        background: #eef4fb;
      }

      .field.is-locked {
        opacity: 0.9;
      }

      input[type="range"] {
        height: 24px;
        margin-top: 5px;
        padding: 0;
        border: 0;
        background: transparent;
        accent-color: var(--primary);
        cursor: pointer;
      }

      input[type="range"]:focus {
        box-shadow: none;
      }

      .field-profit-target input[type="range"] {
        accent-color: var(--success);
      }

      .field-waste input[type="range"] {
        accent-color: var(--danger);
      }

      .field-discount input[type="range"] {
        accent-color: var(--purple);
      }

      .unit {
        position: absolute;
        top: 50%;
        right: 14px;
        color: var(--muted);
        font-weight: 800;
        transform: translateY(-50%);
      }

      .rate-control {
        margin-top: 6px;
        padding: 8px;
        border: 1px solid rgba(71, 85, 105, 0.28);
        border-radius: 8px;
        background: #ffffff;
      }

      .rate-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 3px;
      }

      .rate-head span:first-child {
        color: var(--muted);
        font-size: 0.84rem;
        font-weight: 800;
      }

      .rate-value {
        padding: 4px 8px;
        border-radius: 8px;
        background: rgba(71, 85, 105, 0.18);
        color: var(--text);
        font-size: 0.82rem;
        font-weight: 900;
      }

      .field-waste .rate-value {
        background: rgba(217, 45, 32, 0.18);
        color: var(--danger);
      }

      .field-discount .rate-value {
        background: rgba(125, 76, 194, 0.2);
        color: var(--purple);
      }

      .hint {
        min-height: 14px;
        margin: 4px 0 0;
        color: var(--warning);
        font-size: 0.78rem;
      }

      .result-panel {
        overflow: hidden;
      }

      .result {
        padding: 18px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(135deg, rgba(18, 128, 92, 0.2), rgba(33, 118, 255, 0.16));
      }

      .result-label {
        margin: 0 0 4px;
        color: var(--muted);
        font-weight: 900;
      }

      .result-value {
        margin: 0;
        color: var(--success);
        font-size: clamp(2.6rem, 4.8vw, 4.7rem);
        font-weight: 900;
        line-height: 0.98;
        overflow-wrap: anywhere;
      }

      .result-value .yen-unit {
        font-size: 0.5em;
        line-height: 1;
        vertical-align: baseline;
      }

      .breakdown {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 12px;
      }

      .breakdown.is-hidden {
        display: none;
      }

      .metric {
        padding: 9px;
        border: 1px solid rgba(71, 85, 105, 0.3);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.94);
      }

      .metric.is-hidden {
        display: none;
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 0.76rem;
        font-weight: 700;
      }

      .metric strong {
        display: block;
        margin-top: 2px;
        font-size: 1.05rem;
        overflow-wrap: anywhere;
      }

      .impact-panel {
        display: grid;
        gap: 7px;
        margin-top: 12px;
      }

      .impact-row {
        display: grid;
        grid-template-columns: 86px 1fr 70px;
        gap: 10px;
        align-items: center;
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 800;
      }

      .impact-track {
        height: 9px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(71, 85, 105, 0.26);
      }

      .impact-fill {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        transition: width 180ms ease;
      }

      .impact-fill-waste {
        background: var(--danger);
      }

      .impact-fill-discount {
        background: var(--purple);
      }

      .impact-value {
        text-align: right;
        color: var(--text);
        overflow-wrap: anywhere;
      }

      .target-summary {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 14px;
        align-items: center;
        margin-top: 12px;
        padding: 12px;
        border: 1px solid rgba(18, 128, 92, 0.4);
        border-radius: 8px;
        background: rgba(18, 128, 92, 0.16);
      }

      .target-summary span {
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 800;
      }

      .target-summary strong {
        display: block;
        margin-top: 2px;
        color: var(--success);
        font-size: 1.18rem;
        overflow-wrap: anywhere;
      }

      .chart-area {
        min-height: 390px;
        padding: 16px 18px 18px;
        background: #ffffff;
      }

      .chart-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
      }

      .chart-title h2 {
        margin: 0;
        font-size: 1.08rem;
      }

      .chart-title p {
        margin: 0;
        color: var(--muted);
        font-size: 0.8rem;
      }

      .chart-expand-button {
        width: 32px;
        height: 32px;
        display: inline-grid;
        place-items: center;
        border: 1px solid #b8c3d2;
        border-radius: 10px;
        background: #ffffff;
        color: #111827;
        font-size: 1rem;
        font-weight: 950;
        line-height: 1;
        cursor: pointer;
        box-shadow: 0 8px 18px rgba(24, 38, 62, 0.1);
      }

      .chart-expand-button:hover,
      .chart-expand-button:focus-visible {
        border-color: #111827;
        background: #111827;
        color: #ffffff;
        outline: none;
      }

      body.graph-expanded {
        overflow: hidden;
      }

      .chart-area.is-expanded {
        position: fixed;
        inset: 10px;
        z-index: 50;
        height: calc(100svh - 20px);
        min-height: 0;
        display: flex;
        flex-direction: column;
        padding: 14px;
        border: 1px solid #b8c3d2;
        border-radius: 20px;
        background: #ffffff;
        box-shadow: 0 24px 70px rgba(17, 24, 39, 0.28);
      }

      .chart-area.is-expanded .chart-box {
        flex: 1;
        height: auto;
        min-height: 0;
      }

      .chart-area.is-expanded .chart-expand-button {
        background: #111827;
        color: #ffffff;
      }

      .graph-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 8px;
      }

      .graph-button {
        min-height: 28px;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8fbff;
        color: var(--text);
        font: inherit;
        font-size: 0.78rem;
        font-weight: 800;
        cursor: pointer;
      }

      .graph-button.is-active,
      .graph-button:hover,
      .graph-button:focus-visible {
        border-color: #111827;
        background: #111827;
        color: #ffffff;
        outline: none;
      }

      .chart-box {
        position: relative;
        height: 480px;
      }

      .chart-legend {
        display: none;
      }

      .scenario-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        margin-top: 10px;
      }

      .scenario {
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcff;
      }

      .scenario.is-active {
        border-color: #111827;
        box-shadow: 0 12px 28px rgba(17, 24, 39, 0.1);
      }

      .scenario span {
        display: block;
        color: var(--muted);
        font-size: 0.7rem;
        font-weight: 800;
      }

      .scenario strong {
        display: block;
        margin-top: 2px;
        font-size: 0.96rem;
        overflow-wrap: anywhere;
      }

      footer {
        padding: 8px 16px 10px;
        color: var(--muted);
        text-align: center;
        font-size: 0.82rem;
        font-weight: 700;
      }

      @media (max-width: 860px) {
        main {
          padding-top: 30px;
        }

        .header {
          padding: 0;
        }

        .plan-badge {
          display: none;
        }

        .layout {
          grid-template-columns: 1fr;
        }

        .breakdown {
          grid-template-columns: 1fr;
        }

        .impact-row {
          grid-template-columns: 82px 1fr;
        }

        .impact-value {
          grid-column: 2;
          text-align: left;
        }

        .scenario-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 520px) {
        body {
          overflow-x: hidden;
          background:
            linear-gradient(135deg, rgba(33, 118, 255, 0.16), transparent 34%),
            var(--bg);
          color: var(--text);
        }

        main {
          width: calc(100% - 10px);
          height: 100svh;
          padding: 7px 0;
          overflow: hidden;
        }

        .header {
          margin-bottom: 6px;
        }

        h1 {
          font-size: clamp(1.35rem, 7vw, 1.85rem);
          white-space: normal;
        }

        .subtitle {
          display: none;
        }

        .layout {
          grid-template-columns: minmax(0, 0.36fr) minmax(0, 0.64fr);
          gap: 6px;
          align-items: stretch;
          height: calc(100svh - 44px);
          overflow: hidden;
        }

        .panel {
          background: var(--panel);
          border-color: #b8c5d6;
          border-radius: 20px;
          box-shadow:
            0 18px 42px rgba(24, 38, 62, 0.22),
            0 1px 0 rgba(255, 255, 255, 0.9) inset;
        }

        .result-panel {
          height: 100%;
          display: flex;
          flex-direction: column;
        }

        .inputs {
          height: 100%;
          padding: 8px;
          background: #f8fafc;
          overflow-y: auto;
          overscroll-behavior: contain;
          scrollbar-width: thin;
        }

        .mode-toggle,
        .solve-toggle {
          gap: 5px;
          margin-bottom: 7px;
        }

        .mode-button,
        .solve-button,
        .support-button {
          min-height: 22px;
          padding: 0 3px;
          border-color: #b9c5d5;
          border-radius: 12px;
          background: #ffffff;
          color: var(--text);
          font-size: 0.52rem;
          font-weight: 950;
          line-height: 1.1;
          box-shadow: 0 4px 12px rgba(24, 38, 62, 0.08);
        }

        .mode-button.is-active,
        .solve-button.is-active,
        .support-button.is-active {
          border-color: #111827;
          background: #111827;
          color: #ffffff;
          box-shadow: 0 8px 18px rgba(17, 24, 39, 0.24);
        }

        .reset-button {
          min-height: 26px;
          margin-bottom: 8px;
          border-color: #b9c5d5;
          border-radius: 12px;
          font-size: 0.58rem;
          background: #ffffff;
        }

        .toggle-caption {
          margin-bottom: 4px;
          font-size: 0.58rem;
          color: #334155;
        }

        .solve-toggle {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .support-toggle {
          grid-template-columns: 30px repeat(3, minmax(0, 1fr));
          gap: 5px;
          margin-bottom: 8px;
          padding: 6px;
          border-color: rgba(18, 128, 92, 0.46);
          border-radius: 16px;
          background: rgba(18, 128, 92, 0.16);
        }

        .support-label {
          color: #334155;
          font-size: 0.5rem;
          line-height: 1.05;
          text-align: center;
          word-break: keep-all;
        }

        .support-label::after {
          content: "";
        }

        .field {
          margin-bottom: 8px;
        }

        .field-profit-target {
          margin-bottom: 9px;
          padding: 9px;
          border-color: rgba(18, 128, 92, 0.52);
          border-radius: 20px;
          background:
            linear-gradient(135deg, rgba(18, 128, 92, 0.28), rgba(33, 118, 255, 0.18)),
            #ffffff;
          box-shadow: 0 10px 24px rgba(18, 128, 92, 0.12);
        }

        .field-profit-target::before {
          height: 3px;
        }

        .goal-kicker {
          display: none;
        }

        .field-head {
          gap: 4px;
          margin-bottom: 2px;
        }

        label,
        .rate-head span:first-child {
          font-size: 0.6rem;
          font-weight: 950;
          color: var(--text);
        }

        .field-profit-target label,
        .field-profit-target .unit,
        .field-profit-target .live-value {
          color: var(--success);
        }

        .field-waste label,
        .field-waste .unit,
        .field-waste .live-value {
          color: var(--danger);
        }

        .field-discount label,
        .field-discount .unit,
        .field-discount .live-value {
          color: var(--purple);
        }

        .live-value,
        .rate-value {
          max-width: 56%;
          padding: 3px 6px;
          border-radius: 8px;
          font-size: 0.58rem;
          font-weight: 950;
          background: rgba(33, 118, 255, 0.2);
        }

        .field-sales input,
        .field-profit-target input,
        .field-waste input,
        .field-discount input {
          padding: 0 20px;
          text-align: center;
          font-size: var(--amount-font-size, 0.74rem);
        }

        .field-sales input.is-long-number,
        .field-profit-target input.is-long-number,
        .field-waste input.is-long-number,
        .field-discount input.is-long-number {
          --amount-font-size: 0.64rem;
        }

        .field-sales input.is-extra-long-number,
        .field-profit-target input.is-extra-long-number,
        .field-waste input.is-extra-long-number,
        .field-discount input.is-extra-long-number {
          --amount-font-size: 0.58rem;
        }

        input {
          height: 30px;
          padding: 0 24px 0 8px;
          border-color: #b9c5d5;
          border-radius: 12px;
          background: #ffffff;
          color: var(--text);
          font-size: 0.74rem;
          font-weight: 850;
          box-shadow: 0 1px 0 rgba(255, 255, 255, 0.9) inset;
        }

        .unit {
          right: 6px;
          font-size: 0.5rem;
          font-weight: 950;
        }

        input[type="range"] {
          -webkit-appearance: none;
          appearance: none;
          height: 44px;
          margin-top: 4px;
          accent-color: currentColor;

  <body>
    <div class="app">
      <main>
        <header class="header">

            <div class="mode-toggle" aria-label="計算モード">

                <canvas id="profitChart" aria-label="PLグラフ"></canvas>

    <script>
      const salesTargetInput = document.getElementById("salesTarget");
      const wasteAmountInput = document.getElementById("wasteAmount");
      const discountAmountInput = document.getElementById("discountAmount");
      const profitTargetInput = document.getElementById("profitTarget");
      const targetDaysInput = document.getElementById("targetDays");
      const salesTargetSlider = document.getElementById("salesTargetSlider");
      const wasteAmountSlider = document.getElementById("wasteAmountSlider");
      const discountAmountSlider = document.getElementById("discountAmountSlider");
      const profitTargetSlider = document.getElementById("profitTargetSlider");
      const wasteRateSlider = document.getElementById("wasteRateSlider");
      const discountRateSlider = document.getElementById("discountRateSlider");
      const salesTargetLive = document.getElementById("salesTargetLive");
      const wasteAmountLive = document.getElementById("wasteAmountLive");
      const discountAmountLive = document.getElementById("discountAmountLive");
      const profitTargetLive = document.getElementById("profitTargetLive");
      const targetDaysLive = document.getElementById("targetDaysLive");
      const salesTargetLabel = document.getElementById("salesTargetLabel");
      const profitTargetLabel = document.getElementById("profitTargetLabel");
      const wasteRateLive = document.getElementById("wasteRateLive");
      const discountRateLive = document.getElementById("discountRateLive");
      const validationMessage = document.getElementById("validationMessage");
      const resultLabelOutput = document.getElementById("resultLabel");
      const grossProfitOutput = document.getElementById("grossProfit");
      const baseProfitOutput = document.getElementById("baseProfit");
      const breakdownPanel = document.querySelector(".breakdown");
      const kitchenBonusMetric = document.getElementById("kitchenBonusMetric");
      const kitchenBonusOutput = document.getElementById("kitchenBonus");
      const wasteImpactBar = document.getElementById("wasteImpactBar");
      const discountImpactBar = document.getElementById("discountImpactBar");
      const wasteImpactValue = document.getElementById("wasteImpactValue");
      const discountImpactValue = document.getElementById("discountImpactValue");
      const requiredSalesOutput = document.getElementById("requiredSales");
      const targetSummaryLabel = document.getElementById("targetSummaryLabel");
      const targetStatus = document.getElementById("targetStatus");
      const chartCanvas = document.getElementById("profitChart");
      const chartLegend = document.getElementById("chartLegend");
      const chartClickHint = document.getElementById("chartClickHint");
      const chartArea = document.querySelector(".chart-area");
      const chartExpandButton = document.getElementById("chartExpandButton");
      const supportToggle = document.getElementById("supportToggle");
      const resetButton = document.getElementById("resetButton");
      const graphRangeButtons = document.querySelectorAll(".graph-button");
      const modeButtons = document.querySelectorAll(".mode-button");
      const solveButtons = document.querySelectorAll(".solve-button");
      const supportButtons = document.querySelectorAll(".support-button");

      const yenFormatter = new Intl.NumberFormat("ja-JP", {
        maximumFractionDigits: 0
      });

      let profitChart;
      let graphRangeMultiplier = 2;
      let currentMode = "ff";
      let solveMode = "creation";
      let kitchenSupportRate = null;
      const WASTE_LOSS_RATE = 0.5;
      const DISCOUNT_LOSS_RATE = 0.5;
      const PL_BASE_RATE = 0.5;

      const valueGuidePlugin = {
        id: "valueGuidePlugin",
        afterDatasetsDraw(chart) {
          const currentDataset = chart.data.datasets.find((dataset) => dataset.label === "現在値");
          const currentPoint = currentDataset?.data?.[0];

          if (!currentPoint || !Number.isFinite(currentPoint.x) || !Number.isFinite(currentPoint.y)) {
            return;
          }

          const { ctx, chartArea, scales } = chart;
          const pointX = clamp(scales.x.getPixelForValue(currentPoint.x), chartArea.left, chartArea.right);
          const pointY = clamp(scales.y.getPixelForValue(currentPoint.y), chartArea.top, chartArea.bottom);
          const originY = clamp(scales.y.getPixelForValue(0), chartArea.top, chartArea.bottom);
          const originX = chartArea.left;

          ctx.save();
          ctx.setLineDash([6, 6]);
          ctx.lineWidth = getChartVisuals().guideLineWidth;
          ctx.strokeStyle = "rgba(17, 24, 39, 0.82)";
          ctx.beginPath();
          ctx.moveTo(pointX, pointY);
          ctx.lineTo(pointX, originY);
          ctx.moveTo(originX, pointY);
          ctx.lineTo(pointX, pointY);
          ctx.stroke();
          ctx.setLineDash([]);

          drawGuideTriangle(ctx, pointX, originY, "up");
          drawGuideTriangle(ctx, originX, pointY, "right");

          ctx.shadowColor = "rgba(17, 24, 39, 0.28)";
          ctx.shadowBlur = 10;
          ctx.shadowOffsetY = 3;
          ctx.fillStyle = "#ffffff";
          ctx.beginPath();
          ctx.arc(pointX, pointY, getChartVisuals().currentPointOuterRadius, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowColor = "transparent";
          ctx.fillStyle = "#111827";
          ctx.beginPath();
          ctx.arc(pointX, pointY, getChartVisuals().currentPointInnerRadius, 0, Math.PI * 2);
          ctx.fill();

          drawChartBadge(
            ctx,
            `${getPrimaryAmountLabel()} ${formatYen(currentPoint.x)}`,
            pointX - 72,
            Math.min(originY - 38, chartArea.bottom - 38),
            "#111827",
            chartArea
          );
          drawChartBadge(
            ctx,
            `PL ${formatYen(currentPoint.y)}`,
            chartArea.left + 8,
            clamp(pointY - 34, chartArea.top + 8, chartArea.bottom - 38),
            "#12805c",
            chartArea
          );
          ctx.restore();
        }
      };

      function formatYen(value) {
        return `${yenFormatter.format(Math.round(value))}円`;
      }

      function formatMainYen(value) {
        return `${yenFormatter.format(Math.round(value))}<span class="yen-unit">円</span>`;
      }

      function formatCompactYen(value) {
        const rounded = Math.round(value);
        const sign = rounded < 0 ? "-" : "";
        const absolute = Math.abs(rounded);

        if (absolute >= 10000) {
          return `${sign}${Number((absolute / 10000).toFixed(1)).toString()}万`;
        }

        if (absolute >= 1000) {
          return `${sign}${Number((absolute / 1000).toFixed(1)).toString()}千`;
        }

        return `${sign}${yenFormatter.format(absolute)}`;
      }

      function formatLiveYen(value) {
        const rounded = Math.round(value);
        return Math.abs(rounded) >= 10000 ? formatCompactYen(rounded) : formatYen(rounded);
      }

      function formatPercent(value) {
        return `${Number(value).toFixed(1).replace(/\.0$/, "")}%`;
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function isMobileChart() {
        return window.matchMedia("(max-width: 768px)").matches;
      }

      function getChartVisuals() {
        const mobile = isMobileChart();

        return {
          legendFontSize: mobile ? 16 : 9,
          legendBoxSize: mobile ? 16 : 12,
          axisTitleSize: mobile ? 9 : 8,
          axisTickSize: mobile ? 11 : 7,
          badgeFontSize: mobile ? 13 : 8,
          badgeHeight: mobile ? 28 : 17,
          badgePaddingX: mobile ? 9 : 5,
          badgePaddingY: mobile ? 4 : 2,
          mainLineWidth: mobile ? 3.3 : 2.2,
          guideLineWidth: mobile ? 3 : 2.5,
          currentPointOuterRadius: mobile ? 9 : 7,
          currentPointInnerRadius: mobile ? 5.2 : 4
        };
      }

      function getLegendColor(dataset) {
        if (dataset.label === "現在値") {
          return "#111827";
        }
        if (dataset.label.includes("廃棄")) {
          return "#d92d20";
        }
        if (dataset.label.includes("値引")) {
          return "#7d4cc2";
        }
        return "#12805c";
      }

      function renderChartLegend() {
        if (!profitChart || !chartLegend) {
          return;
        }

        const order = ["PLライン", "廃棄なしの場合", "値引きなしの場合", "現在値"];
        const shortLabels = {
          "PLライン": "PL",
          "廃棄なしの場合": "廃棄無し",
          "値引きなしの場合": "値引無し",
          "現在値": "現在値"
        };
        const datasets = profitChart.data.datasets
          .filter((dataset) => Array.isArray(dataset.data) && dataset.data.length > 0)
          .filter((dataset) => order.includes(dataset.label))
          .sort((a, b) => order.indexOf(a.label) - order.indexOf(b.label));

        chartLegend.innerHTML = datasets
          .map((dataset) => {
            const color = getLegendColor(dataset);
            return `<div class="chart-legend-item" style="color: ${color}"><span class="chart-legend-marker"></span><span>${shortLabels[dataset.label] || dataset.label}</span></div>`;
          })
          .join("");
      }

      function toggleChartExpanded() {
        const isExpanded = chartArea.classList.toggle("is-expanded");
        document.body.classList.toggle("graph-expanded", isExpanded);
        chartExpandButton.textContent = isExpanded ? "×" : "⛶";
        chartExpandButton.setAttribute("aria-label", isExpanded ? "グラフを閉じる" : "グラフを拡大");
        chartExpandButton.setAttribute("title", isExpanded ? "グラフを閉じる" : "グラフを拡大");

        requestAnimationFrame(() => {
          profitChart?.resize();
          profitChart?.update();
        });
      }

      function drawGuideTriangle(ctx, x, y, direction) {
        ctx.save();
        ctx.fillStyle = "#111827";
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 1.8;
        ctx.beginPath();

        if (direction === "right") {
          ctx.moveTo(x + 10, y);
          ctx.lineTo(x - 2, y - 7);
          ctx.lineTo(x - 2, y + 7);
        } else {
          ctx.moveTo(x, y - 10);
          ctx.lineTo(x - 7, y + 2);
          ctx.lineTo(x + 7, y + 2);
        }

        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }

      function drawChartBadge(ctx, text, x, y, color, chartArea) {
        const visuals = getChartVisuals();
        ctx.save();
        ctx.font = `900 ${visuals.badgeFontSize}px 'Noto Sans JP', 'Yu Gothic', sans-serif`;

        const paddingX = visuals.badgePaddingX;
        const paddingY = visuals.badgePaddingY;
        const width = ctx.measureText(text).width + paddingX * 2;
        const height = visuals.badgeHeight;
        const radius = 8;
        const badgeX = chartArea ? clamp(x, chartArea.left + 6, chartArea.right - width - 6) : x;
        const badgeY = chartArea ? clamp(y, chartArea.top + 6, chartArea.bottom - height - 6) : y;

        ctx.shadowColor = "rgba(17, 24, 39, 0.16)";
        ctx.shadowBlur = 10;
        ctx.shadowOffsetY = 3;
        ctx.fillStyle = "rgba(255, 255, 255, 0.98)";
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(badgeX, badgeY, width, height, radius);
        ctx.fill();
        ctx.stroke();

        ctx.shadowColor = "transparent";
        ctx.fillStyle = color;
        ctx.fillText(text, badgeX + paddingX, badgeY + height - paddingY - 2);
        ctx.restore();
      }

      function hasInputValue(input) {
        return input.value.trim() !== "";
      }

      function isReverseSolveMode(mode = solveMode) {
        return mode === "gross" || mode === "pl";
      }

      function hasActiveSourceInput() {
        return isReverseSolveMode() ? hasInputValue(profitTargetInput) : hasInputValue(salesTargetInput);
      }

      function getPrimaryAmountLabel() {
        return solveMode === "sales" ? "販売高" : "作成高";
      }

      function updateKitchenSupportVisibility() {
        const isKitchenMode = currentMode === "kitchen";
        kitchenBonusMetric.classList.toggle("is-hidden", !isKitchenMode);
      }

      function updateReverseResultLayout(isReverseMode) {
        breakdownPanel.classList.toggle("is-hidden", isReverseMode);
      }

      function getTargetInputLabel() {
        if (solveMode === "gross") {
          return "荒利益高目標";
        }

        if (solveMode === "pl") {
          return "PL目標";
        }

        return "PL";
      }

      function getTargetPointLabel() {
        return solveMode === "gross" ? "荒利益高目標位置" : "PL目標位置";
      }

      function readPositiveNumber(input) {
        const value = Number(input.value);

        if (Number.isNaN(value) || input.value === "") {
          return 0;
        }

        if (value < 0) {
          input.value = 0;
          return 0;
        }

        return value;
      }

      function readTargetDays() {
        const value = readPositiveNumber(targetDaysInput);
        return value > 0 ? value : 1;
      }

      function syncNumberToSlider(numberInput, sliderInput) {
        let value = readPositiveNumber(numberInput);
        const fixedMax = Number(sliderInput.dataset.fixedMax || numberInput.dataset.fixedMax);
        const currentMax = Number(sliderInput.max);

        if (fixedMax && value > fixedMax) {
          value = fixedMax;
          numberInput.value = String(fixedMax);
        }

        if (value > currentMax) {
          sliderInput.max = String(Math.ceil(value / 1000) * 1000);
        }

        sliderInput.value = String(value);
        updateAmountInputClass(numberInput);
      }

      function clearInputPair(numberInput, sliderInput) {
        numberInput.value = "";
        sliderInput.value = "0";
        updateAmountInputClass(numberInput);
      }

      function syncSliderToNumber(sliderInput, numberInput) {
        numberInput.value = sliderInput.value;
        updateAmountInputClass(numberInput);
      }

      function updateAmountInputClass(input) {
        const digits = input.value.replace(/\D/g, "").length;
        input.classList.toggle("is-long-number", digits >= 6);
        input.classList.toggle("is-extra-long-number", digits >= 7);
      }

      function updateAmountInputClasses() {
        [salesTargetInput, wasteAmountInput, discountAmountInput, profitTargetInput].forEach(updateAmountInputClass);
      }

      function syncAmountToRate(amountInput, rateSlider) {
        const salesTarget = readPositiveNumber(salesTargetInput);
        const amount = readPositiveNumber(amountInput);
        const rate = salesTarget > 0 ? Math.min((amount / salesTarget) * 100, 100) : 0;
        rateSlider.value = String(rate);
      }

      function syncRateToAmount(rateSlider, amountInput, amountSlider) {
        const salesTarget = readPositiveNumber(salesTargetInput);
        const rate = Number(rateSlider.value);
        const amount = Math.round((salesTarget * rate) / 100);

        amountInput.value = String(amount);
        syncNumberToSlider(amountInput, amountSlider);
      }

      function setSolveMode(nextMode, shouldRefresh = true) {
        solveMode = nextMode;

        const isReverseMode = isReverseSolveMode();
        const creationLocked = isReverseMode;
        const profitLocked = !isReverseMode;
        const isSalesMode = solveMode === "sales";
        salesTargetInput.disabled = creationLocked;
        salesTargetSlider.disabled = creationLocked;
        profitTargetInput.disabled = profitLocked;
        profitTargetSlider.disabled = profitLocked;
        salesTargetInput.closest(".field").classList.toggle("is-locked", creationLocked);
        profitTargetInput.closest(".field").classList.toggle("is-locked", profitLocked);
        salesTargetLabel.textContent = isSalesMode ? "販売高" : "作成高";
        salesTargetSlider.setAttribute("aria-label", `${isSalesMode ? "販売高" : "作成高"}スライダー`);
        profitTargetLabel.textContent = getTargetInputLabel();
        profitTargetSlider.setAttribute("aria-label", `${getTargetInputLabel()}スライダー`);
        chartClickHint.textContent = `クリックで${isSalesMode ? "販売高" : "作成高"}に反映`;

        solveButtons.forEach((button) => {
          button.classList.toggle("is-active", button.dataset.solveMode === solveMode);
        });

        if (shouldRefresh) {
          refreshCalculator();
        }
      }

      function setKitchenSupportRate(nextRate, shouldRefresh = true) {
        kitchenSupportRate = kitchenSupportRate === nextRate ? null : nextRate;

        supportButtons.forEach((button) => {
          button.classList.toggle("is-active", Number(button.dataset.supportRate) === kitchenSupportRate);
        });

        if (shouldRefresh) {
          refreshCalculator();
        }
      }

      function getDefaultKitchenSupportRate(netCreation) {
        if (netCreation >= 30000) {
          return 10;
        }

        if (netCreation >= 20000) {
          return 8;
        }

        if (netCreation >= 10000) {
          return 7;
        }

        return 0;
      }

      function getActiveKitchenSupportRate(netCreation) {
        return kitchenSupportRate ?? getDefaultKitchenSupportRate(netCreation);
      }

      function getKitchenBonus(netCreation) {
        if (currentMode !== "kitchen") {
          return 0;
        }

        return netCreation * (getActiveKitchenSupportRate(netCreation) / 100);
      }

      function getKitchenBonusRate(netCreation) {
        if (currentMode !== "kitchen" || netCreation <= 0) {
          return 0;
        }

        return getActiveKitchenSupportRate(netCreation);
      }

      function calculateGrossProfit(creationAmount, wasteAmount, discountAmount) {
        const netCreation = creationAmount - wasteAmount - discountAmount;
        const baseProfit = netCreation * 0.5;
        const wasteLoss = wasteAmount * WASTE_LOSS_RATE;
        const discountLoss = discountAmount * DISCOUNT_LOSS_RATE;
        const kitchenBonus = getKitchenBonus(netCreation);
        const kitchenBonusRate = getKitchenBonusRate(netCreation);
        const grossProfit = baseProfit - wasteLoss - discountLoss;

        return {
          netCreation,
          baseProfit,
          wasteLoss,
          discountLoss,
          kitchenBonus,
          kitchenBonusRate,
          grossProfit
        };
      }

      function calculateActualProfit(salesAmount, wasteAmount, discountAmount) {
        const baseProfit = salesAmount * 0.5;
        const wasteLoss = wasteAmount * WASTE_LOSS_RATE;
        const discountLoss = discountAmount * DISCOUNT_LOSS_RATE;
        const kitchenBonus = getKitchenBonus(salesAmount);
        const kitchenBonusRate = getKitchenBonusRate(salesAmount);
        const grossProfit = baseProfit - wasteLoss - discountLoss;

        return {
          netCreation: salesAmount,
          baseProfit,
          wasteLoss,
          discountLoss,
          kitchenBonus,
          kitchenBonusRate,
          grossProfit
        };
      }

      function calculateProfitByCurrentMode(amount, wasteAmount, discountAmount) {
        return solveMode === "sales"
          ? calculateActualProfit(amount, wasteAmount, discountAmount)
          : calculateGrossProfit(amount, wasteAmount, discountAmount);
      }

      function calculatePL(baseGrossProfit, kitchenBonus) {
        return baseGrossProfit * PL_BASE_RATE + kitchenBonus;
      }

      function calculateCreationPL(creationAmount, wasteAmount, discountAmount) {
        const result = calculateGrossProfit(creationAmount, wasteAmount, discountAmount);

        return calculatePL(result.grossProfit, result.kitchenBonus);
      }

      function calculateGraphPL(amount, wasteAmount, discountAmount) {
        const result = calculateProfitByCurrentMode(amount, wasteAmount, discountAmount);

        return calculatePL(result.grossProfit, result.kitchenBonus);
      }

      function findRequiredCreationByTarget(targetAmount, wasteAmount, discountAmount, valueGetter) {
        let low = 0;
        let high = 999999;

        for (let creation = 0; creation <= 999999; creation += 100) {
          if (valueGetter(creation, wasteAmount, discountAmount) >= targetAmount) {
            high = creation;
            low = Math.max(0, creation - 100);
            break;
          }
        }

        for (let index = 0; index < 40; index += 1) {
          const middle = (low + high) / 2;
          const value = valueGetter(middle, wasteAmount, discountAmount);

          if (value >= targetAmount) {
            high = middle;
          } else {
            low = middle;
          }
        }

        return high;
      }

      function findRequiredCreationByGross(grossTarget, wasteAmount, discountAmount) {
        return findRequiredCreationByTarget(
          grossTarget,
          wasteAmount,
          discountAmount,
          (creation, waste, discount) => calculateGrossProfit(creation, waste, discount).grossProfit
        );
      }

      function findRequiredCreationByPL(plTarget, wasteAmount, discountAmount) {
        return findRequiredCreationByTarget(
          plTarget,
          wasteAmount,
          discountAmount,
          (creation, waste, discount) => calculateCreationPL(creation, waste, discount)
        );
      }

      function calculateProfit() {
        const salesTarget = readPositiveNumber(salesTargetInput);
        const wasteAmount = readPositiveNumber(wasteAmountInput);
        const discountAmount = readPositiveNumber(discountAmountInput);
        const reverseTarget = readPositiveNumber(profitTargetInput);
        const targetDays = readTargetDays();
        const requiredSales =
          solveMode === "gross"
            ? Math.max(findRequiredCreationByGross(reverseTarget, wasteAmount, discountAmount), 0)
            : Math.max(findRequiredCreationByPL(reverseTarget, wasteAmount, discountAmount), 0);
        const activeCreation = isReverseSolveMode() ? requiredSales : salesTarget;
        const result = calculateProfitByCurrentMode(activeCreation, wasteAmount, discountAmount);

        return {
          salesTarget,
          wasteAmount,
          discountAmount,
          profitTarget: reverseTarget,
          reverseTarget,
          targetDays,
          activeCreation,
          grossProfit: result.grossProfit,
          pl: calculatePL(result.grossProfit, result.kitchenBonus),
          grossProfitBase: result.grossProfit,
          grossProfitBeforeLoss: result.baseProfit,
          wasteLoss: result.wasteLoss,
          discountLoss: result.discountLoss,
          kitchenBonus: result.kitchenBonus,
          kitchenBonusRate: result.kitchenBonusRate,
          netCreation: result.netCreation,
          requiredSales
        };
      }

      function updateOutputs(result) {
        const isReverseMode = isReverseSolveMode();
        const isSalesMode = solveMode === "sales";
        const resultLabel = isReverseMode ? "必要な作成高" : "PL";
        const displayedResult = (isReverseMode ? result.requiredSales : result.pl) * result.targetDays;
        const hasTargetDays = hasInputValue(targetDaysInput);

        resultLabelOutput.textContent = resultLabel;
        grossProfitOutput.innerHTML = formatMainYen(displayedResult);
        baseProfitOutput.textContent = formatYen(result.grossProfitBase * result.targetDays);
        updateKitchenSupportVisibility();
        updateReverseResultLayout(isReverseMode);

        if (currentMode === "kitchen") {
          document.getElementById("kitchenBonusLabel").textContent =
            result.kitchenBonusRate > 0 ? `厨房支援 ${result.kitchenBonusRate}%` : "厨房支援";
          kitchenBonusOutput.textContent = formatYen(result.kitchenBonus * result.targetDays);
        } else {
          document.getElementById("kitchenBonusLabel").textContent = "";
          kitchenBonusOutput.textContent = "";
        }

        if (isReverseMode) {
          salesTargetInput.value = String(Math.round(result.requiredSales));
          syncNumberToSlider(salesTargetInput, salesTargetSlider);
          syncAmountToRate(wasteAmountInput, wasteRateSlider);
          syncAmountToRate(discountAmountInput, discountRateSlider);
        } else {
          profitTargetInput.value = String(Math.round(result.pl));
          syncNumberToSlider(profitTargetInput, profitTargetSlider);
        }

        salesTargetLive.textContent = formatLiveYen(isReverseMode ? result.requiredSales : result.salesTarget);
        wasteAmountLive.textContent = formatLiveYen(result.wasteAmount);
        discountAmountLive.textContent = formatLiveYen(result.discountAmount);
        profitTargetLive.textContent = formatLiveYen(isReverseMode ? result.profitTarget : result.pl);
        targetDaysLive.textContent = hasInputValue(targetDaysInput) ? `${formatYen(result.targetDays).replace("円", "")}日` : "1日";
        wasteRateLive.textContent = formatPercent(wasteRateSlider.value);
        discountRateLive.textContent = formatPercent(discountRateSlider.value);
        targetSummaryLabel.textContent = isSalesMode ? "対象日数分の販売高" : "対象日数分の必要な作成高";
        requiredSalesOutput.textContent = !hasTargetDays
          ? "-"
          : isSalesMode
            ? formatYen(result.salesTarget * result.targetDays)
            : formatYen(result.requiredSales * result.targetDays);
        targetStatus.textContent = !hasTargetDays
          ? "未入力"
          : isReverseMode
            ? "作成高"
            : isSalesMode
              ? "実績計算"
              : "自動計算";
        updateAmountInputClasses();
      }

      function updateBlankOutputs() {
        const isReverseMode = isReverseSolveMode();
        const isSalesMode = solveMode === "sales";
        const resultLabel = isReverseMode ? "必要な作成高" : "PL";

        resultLabelOutput.textContent = resultLabel;
        grossProfitOutput.textContent = "-";
        baseProfitOutput.textContent = "-";
        updateKitchenSupportVisibility();
        updateReverseResultLayout(isReverseMode);

        if (currentMode === "kitchen") {
          document.getElementById("kitchenBonusLabel").textContent = "厨房支援";
          kitchenBonusOutput.textContent = "-";
        } else {
          document.getElementById("kitchenBonusLabel").textContent = "";
          kitchenBonusOutput.textContent = "";
        }

        if (isReverseMode) {
          clearInputPair(salesTargetInput, salesTargetSlider);
        } else {
          clearInputPair(profitTargetInput, profitTargetSlider);
        }

        salesTargetLive.textContent = hasInputValue(salesTargetInput)
          ? formatLiveYen(readPositiveNumber(salesTargetInput))
          : "-";
        wasteAmountLive.textContent = hasInputValue(wasteAmountInput)
          ? formatLiveYen(readPositiveNumber(wasteAmountInput))
          : "-";
        discountAmountLive.textContent = hasInputValue(discountAmountInput)
          ? formatLiveYen(readPositiveNumber(discountAmountInput))
          : "-";
        profitTargetLive.textContent = hasInputValue(profitTargetInput)
          ? formatLiveYen(readPositiveNumber(profitTargetInput))
          : "-";
        targetDaysLive.textContent = hasInputValue(targetDaysInput)
          ? `${formatYen(readTargetDays()).replace("円", "")}日`
          : "-";
        wasteRateLive.textContent = hasInputValue(wasteAmountInput) ? formatPercent(wasteRateSlider.value) : "-";
        discountRateLive.textContent = hasInputValue(discountAmountInput)
          ? formatPercent(discountRateSlider.value)
          : "-";
        requiredSalesOutput.textContent = "-";
        targetSummaryLabel.textContent = isSalesMode ? "対象日数分の販売高" : "対象日数分の必要な作成高";
        targetStatus.textContent = "未入力";
        wasteImpactBar.style.width = "0%";
        discountImpactBar.style.width = "0%";
        wasteImpactValue.textContent = "-";
        discountImpactValue.textContent = "-";
        updateAmountInputClasses();
      }

      function updateImpactBars(result) {
        const baseProfit = Math.max(result.grossProfitBeforeLoss, 1);
        const wastePercent = Math.min((result.wasteLoss / baseProfit) * 100, 100);
        const discountPercent = Math.min((result.discountLoss / baseProfit) * 100, 100);

        wasteImpactBar.style.width = `${wastePercent}%`;
        discountImpactBar.style.width = `${discountPercent}%`;
        wasteImpactValue.textContent = `${Math.round(wastePercent)}%`;
        discountImpactValue.textContent = `${Math.round(discountPercent)}%`;
      }

      function updateValidationMessage() {
        const hasNegativeValue = [
          salesTargetInput,
          wasteAmountInput,
          discountAmountInput,
          profitTargetInput,
          targetDaysInput
        ].some((input) => Number(input.value) < 0);

        validationMessage.textContent = hasNegativeValue
          ? "マイナスの金額は入力できません。0円として計算します。"
          : "";
      }

      function createProjectionData(result) {
        const baseCreation = Math.max(result.activeCreation, result.salesTarget, 1);
        const wasteRate = baseCreation > 0 ? result.wasteAmount / baseCreation : 0;
        const discountRate = baseCreation > 0 ? result.discountAmount / baseCreation : 0;
        const hasWaste = result.wasteAmount > 0;
        const hasDiscount = result.discountAmount > 0;
        const maxSalesTarget = Math.max(
          result.activeCreation * graphRangeMultiplier,
          result.requiredSales * 1.2,
          100
        );
        const step = maxSalesTarget / 10;
        const salesPoints = Array.from({ length: 11 }, (_, index) => Math.round(step * index));

        return {
          base: salesPoints.map((sales) => {
            const projectedWaste = sales * wasteRate;
            const projectedDiscount = sales * discountRate;

            return {
              x: sales,
              y: Math.round(calculateGraphPL(sales, projectedWaste, projectedDiscount))
            };
          }),
          wasteOnly: salesPoints.map((sales) => ({
            x: sales,
            y: Math.round(calculateGraphPL(sales, sales * wasteRate, 0))
          })),
          discountOnly: salesPoints.map((sales) => ({
            x: sales,
            y: Math.round(calculateGraphPL(sales, 0, sales * discountRate))
          })),
          both: salesPoints.map((sales) => ({
            x: sales,
            y: Math.round(calculateGraphPL(sales, sales * wasteRate, sales * discountRate))
          })),
          currentPoint: [
            {
              x: Math.round(result.activeCreation),
              y: Math.round(result.pl)
            }
          ],
          targetPoint: [],
          noDiscountPattern: hasDiscount
            ? salesPoints.map((sales) => ({
                x: sales,
                y: Math.round(calculateGraphPL(sales, sales * wasteRate, 0))
              }))
            : [],
          noWastePattern: hasWaste
            ? salesPoints.map((sales) => ({
                x: sales,
                y: Math.round(calculateGraphPL(sales, 0, sales * discountRate))
              }))
            : []
        };
      }

      function createChart(result) {
        const projection = createProjectionData(result);
        const chartVisuals = getChartVisuals();

        profitChart = new Chart(chartCanvas, {
          type: "line",
          data: {
            datasets: [
              {
                label: "PLライン",
                data: projection.base,
                borderColor: "#12805c",
                backgroundColor: "rgba(18, 128, 92, 0.2)",
                borderWidth: chartVisuals.mainLineWidth,
                pointRadius: 2.5,
                pointHoverRadius: 5,
                fill: false,
                tension: 0
              },
              {
                label: "値引きなしの場合",
                data: projection.noDiscountPattern,
                borderColor: "rgba(125, 76, 194, 0.7)",
                backgroundColor: "rgba(125, 76, 194, 0.16)",
                borderWidth: 1.4,
                borderDash: [4, 5],
                pointRadius: 0,
                pointHoverRadius: 4,
                fill: false,
                tension: 0
              },
              {
                label: "廃棄なしの場合",
                data: projection.noWastePattern,
                borderColor: "rgba(217, 45, 32, 0.7)",
                backgroundColor: "rgba(217, 45, 32, 0.16)",
                borderWidth: 1.4,
                borderDash: [4, 5],
                pointRadius: 0,
                pointHoverRadius: 4,
                fill: false,
                tension: 0
              },
              {
                label: "現在値",
                data: projection.currentPoint,
                type: "scatter",
                borderColor: "#ffffff",
                backgroundColor: "#111827",
                borderWidth: 3,
                pointRadius: chartVisuals.currentPointOuterRadius,
                pointHoverRadius: chartVisuals.currentPointOuterRadius + 2
              },
              {
                label: getTargetPointLabel(),
                data: projection.targetPoint,
                type: "scatter",
                borderColor: "#f59e0b",
                backgroundColor: "#f59e0b",
                pointRadius: 5,
                pointHoverRadius: 7
              }
            ]
          },
          options: {

              duration: 220
            },
            plugins: {

                display: !isMobileChart(),

                    size: chartVisuals.legendFontSize,
                    weight: "900"
                  },

                    const dataset = data.datasets[legendItem.datasetIndex];
                    return Array.isArray(dataset.data) && dataset.data.length > 0;
                  }
                }
              },
              tooltip: {
                enabled: true,
                displayColors: false,
                titleFont: {
                  size: isMobileChart() ? 13 : 12,
                  weight: "900"
                },
                bodyFont: {
                  size: isMobileChart() ? 13 : 12,
                  weight: "900"
                },
                padding: isMobileChart() ? 10 : 8,
                backgroundColor: "rgba(17, 24, 39, 0.92)",
                callbacks: {
                  title: (items) => items[0]?.dataset?.label || "",
                  label: (context) =>
                    `${getPrimaryAmountLabel()} ${formatYen(context.parsed.x)} / PL ${formatYen(context.parsed.y)}`
                }
              }
            },
            interaction: {
              mode: "nearest",
              intersect: false,
              axis: "xy"
            },
            scales: {
              x: {
                type: "linear",
                min: 0,
                title: {
                  display: true,
                  text: getPrimaryAmountLabel(),
                  font: {
                    size: chartVisuals.axisTitleSize,
                    weight: "900"
                  },
                  color: "#111827"
                },
                ticks: {
                  font: {
                    size: chartVisuals.axisTickSize,
                    weight: "900"
                  },
                  color: "#111827",
                  callback: (value) => formatCompactYen(value)
                },
                grid: {
                  color: "rgba(71, 85, 105, 0.18)"
                }
              },
              y: {
                beginAtZero: true,
                title: {
                  display: false
                },
                ticks: {
                  font: {
                    size: chartVisuals.axisTickSize,
                    weight: "900"
                  },
                  color: "#111827",
                  callback: (value) => formatCompactYen(value)
                },
                grid: {
                  color: "rgba(71, 85, 105, 0.18)"
                }
              }
            }
          },
          plugins: [valueGuidePlugin]
        });
        renderChartLegend();
      }

      function refreshCalculator() {
        updateValidationMessage();
        const result = calculateProfit();

        if (!hasActiveSourceInput()) {
          updateBlankOutputs();

          if (profitChart) {
            profitChart.data.datasets[0].data = [
              { x: 0, y: 0 },
              { x: 100, y: 0 }
            ];
            profitChart.data.datasets[1].data = [];
          profitChart.data.datasets[2].data = [];
          profitChart.data.datasets[3].data = [];
          profitChart.data.datasets[4].data = [];
            profitChart.data.datasets[4].label = getTargetPointLabel();
          profitChart.options.scales.x.title.text = getPrimaryAmountLabel();
          renderChartLegend();
          profitChart.update();
          }

          return;
        }

        updateOutputs(result);
        updateImpactBars(result);

        if (profitChart) {
          const projection = createProjectionData(result);
          profitChart.data.datasets[0].data = projection.base;
          profitChart.data.datasets[1].data = projection.noDiscountPattern;
          profitChart.data.datasets[2].data = projection.noWastePattern;
          profitChart.data.datasets[3].data = projection.currentPoint;
          profitChart.data.datasets[4].data = projection.targetPoint;
          profitChart.data.datasets[4].label = getTargetPointLabel();
          profitChart.options.scales.x.title.text = getPrimaryAmountLabel();
          renderChartLegend();
          profitChart.update();
        }
      }

      function showChartTooltipAtEvent(event) {
        if (!profitChart) {
          return;
        }

        const elements = profitChart.getElementsAtEventForMode(
          event,
          "nearest",
          { intersect: false },
          true
        );

        if (!elements.length) {
          return;
        }

        const { datasetIndex, index } = elements[0];
        profitChart.setActiveElements([{ datasetIndex, index }]);
        profitChart.tooltip.setActiveElements([{ datasetIndex, index }], {
          x: event.offsetX,
          y: event.offsetY
        });
        profitChart.update();
      }

      function setInputPair(numberInput, sliderInput, value) {
        numberInput.value = String(value);
        syncNumberToSlider(numberInput, sliderInput);
      }

      function clearCalculatorInputs() {
        clearInputPair(salesTargetInput, salesTargetSlider);
        clearInputPair(wasteAmountInput, wasteAmountSlider);
        clearInputPair(discountAmountInput, discountAmountSlider);
        clearInputPair(profitTargetInput, profitTargetSlider);
        targetDaysInput.value = "";
        wasteRateSlider.value = "0";
        discountRateSlider.value = "0";
        kitchenSupportRate = null;
        supportButtons.forEach((button) => button.classList.remove("is-active"));
        refreshCalculator();
      }

      [
        [salesTargetInput, salesTargetSlider],
        [wasteAmountInput, wasteAmountSlider],
        [discountAmountInput, discountAmountSlider],
        [profitTargetInput, profitTargetSlider]
      ].forEach(([numberInput, sliderInput]) => {
        numberInput.addEventListener("input", () => {
          if (numberInput === salesTargetInput && solveMode !== "sales") {
            setSolveMode("creation", false);
          }
          if (numberInput === profitTargetInput && !isReverseSolveMode()) {
            setSolveMode("pl", false);
          }
          syncNumberToSlider(numberInput, sliderInput);
          if (numberInput === salesTargetInput || numberInput === wasteAmountInput) {
            syncAmountToRate(wasteAmountInput, wasteRateSlider);
          }
          if (numberInput === salesTargetInput || numberInput === discountAmountInput) {
            syncAmountToRate(discountAmountInput, discountRateSlider);
          }
          refreshCalculator();
        });

        sliderInput.addEventListener("input", () => {
          if (numberInput === salesTargetInput && solveMode !== "sales") {
            setSolveMode("creation", false);
          }
          if (numberInput === profitTargetInput && !isReverseSolveMode()) {
            setSolveMode("pl", false);
          }
          syncSliderToNumber(sliderInput, numberInput);
          if (numberInput === salesTargetInput || numberInput === wasteAmountInput) {
            syncAmountToRate(wasteAmountInput, wasteRateSlider);
          }
          if (numberInput === salesTargetInput || numberInput === discountAmountInput) {
            syncAmountToRate(discountAmountInput, discountRateSlider);
          }
          refreshCalculator();
        });
      });

      targetDaysInput.addEventListener("input", refreshCalculator);

      resetButton.addEventListener("click", clearCalculatorInputs);
      chartExpandButton.addEventListener("click", toggleChartExpanded);

      wasteRateSlider.addEventListener("input", () => {
        syncRateToAmount(wasteRateSlider, wasteAmountInput, wasteAmountSlider);
        refreshCalculator();
      });

      discountRateSlider.addEventListener("input", () => {
        syncRateToAmount(discountRateSlider, discountAmountInput, discountAmountSlider);
        refreshCalculator();
      });

      graphRangeButtons.forEach((button) => {
        button.addEventListener("click", () => {
          graphRangeMultiplier = Number(button.dataset.graphRange);
          graphRangeButtons.forEach((item) => item.classList.remove("is-active"));
          button.classList.add("is-active");
          refreshCalculator();
        });
      });

      modeButtons.forEach((button) => {
        button.addEventListener("click", () => {
          currentMode = button.dataset.mode;
          modeButtons.forEach((item) => item.classList.remove("is-active"));
          button.classList.add("is-active");
          supportToggle.classList.toggle("is-visible", currentMode === "kitchen");
          updateKitchenSupportVisibility();
          refreshCalculator();
        });
      });

      supportButtons.forEach((button) => {
        button.addEventListener("click", () => {
          setKitchenSupportRate(Number(button.dataset.supportRate));
        });
      });

      solveButtons.forEach((button) => {
        button.addEventListener("click", () => {
          setSolveMode(button.dataset.solveMode);
        });
      });

      chartCanvas.addEventListener("click", (event) => {
        if (!profitChart) {
          return;
        }

        const salesValue = profitChart.scales.x.getValueForPixel(event.offsetX);
        const roundedSales = Math.max(0, Math.round(salesValue / 100) * 100);
        if (isReverseSolveMode()) {
          setSolveMode("creation", false);
        }
        setInputPair(salesTargetInput, salesTargetSlider, roundedSales);
        syncAmountToRate(wasteAmountInput, wasteRateSlider);
        syncAmountToRate(discountAmountInput, discountRateSlider);
        refreshCalculator();
        showChartTooltipAtEvent(event);
      });

      syncAmountToRate(wasteAmountInput, wasteRateSlider);
      syncAmountToRate(discountAmountInput, discountRateSlider);
      setSolveMode("creation", false);
      const initialResult = calculateProfit();
      createChart(initialResult);
      refreshCalculator();
    </script>
  </body>
</html>
